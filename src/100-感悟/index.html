    :root {
  --page-bg: #f7f8fa;
  --paper: #ffffff;
  --paper-strong: #ffffff;
  --ink-900: #111827;
  --ink-700: #374151;
  --ink-500: #6b7280;
  --line: #e5e7eb;
  --line-strong: #d1d5db;
  --accent: #2563eb;
  --accent-soft: rgba(37, 99, 235, 0.1);
  --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.06);
  --shadow-hard: 0 18px 42px rgba(15, 23, 42, 0.08);
  --layout-width: 1400px;
  --reading-width: 54rem;
  --toc-width: 300px;
  --display-font: "Source Serif 4", "Noto Serif SC", "Songti SC", "STSong", serif;
  --body-font: "Source Serif 4", "Noto Serif SC", "Songti SC", "STSong", serif;
  --sans-font: "Source Sans 3", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono-font: "IBM Plex Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  --text-xs: 0.72rem;
  --text-sm: 0.82rem;
  --text-base: 1rem;
  --text-md: 1.06rem;
  --article-text: 1.125rem;
  --article-code: 0.92rem;
  --text-lg: 1.2rem;
  --text-xl: 1.45rem;
  --text-2xl: 1.8rem;
  --text-3xl: clamp(2rem, 3vw, 2.75rem);
  --selection-bg: rgba(37, 99, 235, 0.18);
  --selection-ink: #0b1020;
  --blockquote-border: #93c5fd;
  --blockquote-bg: #f8fafc;
  --code-bg: #eff6ff;
  --code-ink: #1d4ed8;
}

:root[data-theme="dark"] {
  --page-bg: #0b1020;
  --paper: #111827;
  --paper-strong: #151f2e;
  --ink-900: #f1f5f9;
  --ink-700: #cbd5e1;
  --ink-500: #94a3b8;
  --line: #253247;
  --line-strong: #334155;
  --accent: #5eead4;
  --accent-soft: rgba(94, 234, 212, 0.15);
  --shadow-soft: 0 10px 24px rgba(0, 0, 0, 0.22);
  --shadow-hard: 0 18px 42px rgba(0, 0, 0, 0.28);
  --selection-bg: rgba(94, 234, 212, 0.22);
  --selection-ink: #f8fafc;
  --blockquote-border: #2dd4bf;
  --blockquote-bg: #132334;
  --code-bg: #172033;
  --code-ink: #bae6fd;
}

    * {
  box-sizing: border-box;
}

*::selection {
  background: var(--selection-bg);
  color: var(--selection-ink);
}

html {
  font-size: 17.5px;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink-700);
  font-family: var(--body-font);
  font-size: var(--text-base);
  line-height: 1.8;
  font-kerning: normal;
  font-optical-sizing: auto;
  text-rendering: optimizeLegibility;
  background: var(--page-bg);
  transition: background-color 520ms cubic-bezier(0.22, 0.61, 0.36, 1), color 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  background: var(--page-bg);
  transition: opacity 240ms cubic-bezier(0.22, 0.61, 0.36, 1);
}

html.is-page-transition-preload body::after,
body.is-page-leaving::after {
  opacity: 1;
}

html.is-page-transition-lock body {
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  body {
    transition: none;
  }

  body::after {
    transition: none;
  }
}

a {
  color: var(--ink-900);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 0.18em;
  text-decoration-color: color-mix(in srgb, var(--accent) 45%, transparent);
  transition: color 220ms ease, text-decoration-color 220ms ease;
}

a:hover {
  color: var(--accent);
  text-decoration-color: var(--accent);
}

button,
input,
textarea,
select {
  font: inherit;
}

@media (max-width: 720px) {
  html {
    font-size: 16px;
  }
}

    .layout {
  min-height: 100vh;
  position: relative;
  overflow-x: clip;
}

.layout__scene {
  position: relative;
  width: min(var(--layout-width), calc(100vw - 40px));
  margin: 0 auto;
}

.layout__main {
  width: 100%;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, var(--toc-width));
  gap: 30px;
  align-items: start;
  padding: 30px 0 44px;
}

.layout__content {
  position: relative;
  min-width: 0;
  padding: clamp(1.5rem, 3vw, 2.6rem);
  border: 1px solid var(--line);
  border-radius: 4px;
  background: var(--paper);
  box-shadow: var(--shadow-hard);
  transition: background-color 520ms cubic-bezier(0.22, 0.61, 0.36, 1), border-color 520ms cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
}

.header {
  min-width: 0;
  margin-bottom: 1.35rem;
  padding-bottom: 1.35rem;
  border-bottom: 3px double var(--line-strong);
}

.header__utility {
  min-height: 2.3rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.header__eyebrow {
  margin: 0;
  color: var(--ink-500);
  font-family: var(--sans-font);
  font-size: 0.84rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.edition-toggle {
  display: inline-flex;
  align-items: stretch;
  min-height: 2.15rem;
  padding: 0.12rem 0;
  border: 0;
  border-bottom: 1px solid var(--line-strong);
  color: var(--ink-700);
  background: transparent;
  cursor: pointer;
  font-family: var(--sans-font);
  font-size: 0.9rem;
  font-weight: 600;
  line-height: 1;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: border-color 220ms ease, color 220ms ease;
}

.edition-toggle__options {
  display: inline-grid;
  grid-template-columns: 1fr 1fr;
}

.edition-toggle__options span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 4.35rem;
  padding: 0.46rem 0.56rem 0.42rem;
  transition: color 220ms ease, box-shadow 220ms ease;
}

.edition-toggle__options span + span {
  margin-left: 0.1rem;
}

.edition-toggle[data-active-theme="light"] [data-theme-option="light"],
.edition-toggle[data-active-theme="dark"] [data-theme-option="dark"] {
  color: var(--accent);
  box-shadow: inset 0 -2px 0 var(--accent);
}

.edition-toggle:hover,
.edition-toggle:focus-visible {
  border-color: var(--accent);
  color: var(--accent);
}

.edition-toggle:focus-visible {
  outline: 1px solid var(--accent);
  outline-offset: 3px;
}

.header__title {
  max-width: 100%;
  margin: 0;
  color: var(--ink-900);
  font-family: var(--display-font);
  font-size: clamp(2.8rem, 4.6vw, 3.5rem);
  font-weight: 600;
  line-height: 1.05;
  letter-spacing: -0.02em;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.header__line {
  margin-top: 1.1rem;
  display: block;
}

.header__nav {
  margin-top: 1.05rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem 0.78rem;
  justify-content: flex-end;
}

.header__nav-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 2.15rem;
  padding: 0.24rem 0.18rem;
  text-decoration: none;
  color: var(--ink-700);
  font-family: var(--sans-font);
  font-size: 1.08rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  transition: color 220ms ease, text-shadow 220ms ease;
}

.header__nav-link::before {
  content: "[";
  margin-right: 0.08rem;
}

.header__nav-link::after {
  content: "]";
  margin-left: 0.08rem;
}

.header__nav-link:hover,
.header__nav-link--active {
  color: var(--accent);
  text-shadow: 0 0 0 currentColor;
}

.layout__article {
  margin-top: 1rem;
  word-break: break-word;
  overflow-wrap: anywhere;
}

@media (max-width: 980px) {
  .layout__main {
    grid-template-columns: 1fr;
    gap: 20px;
    padding: 20px 0 30px;
  }

  .layout__content {
    box-shadow: var(--shadow-soft);
  }
}

@media (max-width: 720px) {
  .layout__scene {
    width: calc(100% - 20px);
    max-width: var(--layout-width);
  }

  .layout__content {
    width: 100%;
    max-width: 100%;
    padding: 1.25rem 1rem;
  }

  .header__line {
    margin-top: 0.9rem;
  }

  .header__nav {
    margin-top: 0.78rem;
    gap: 0.28rem 0.5rem;
    justify-content: flex-start;
  }

  .header__title {
    font-size: clamp(2rem, 10vw, 2.85rem);
    word-break: break-all;
  }

  .header__nav-link {
    min-height: 2.2rem;
    padding: 0.28rem 0.18rem;
    font-size: 1rem;
  }

}


    .layout__sidebar {
  min-width: 0;
  align-self: start;
  position: sticky;
  top: 20px;
}

.toc-panel {
  max-height: calc(100vh - 40px);
  overflow: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
  padding: 1rem 0.8rem 1.1rem;
  border: 1px solid var(--line);
  border-top: 3px double var(--line-strong);
  border-radius: 4px;
  background: var(--paper-strong);
  box-shadow: var(--shadow-soft);
  transition: background-color 520ms cubic-bezier(0.22, 0.61, 0.36, 1), border-color 520ms cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
}

.toc-panel::-webkit-scrollbar {
  width: 0;
  height: 0;
  display: none;
}

.toc-panel__title {
  margin: 0 0 0.8rem;
  padding: 0 0.35rem 0.65rem;
  border-bottom: 1px solid var(--line);
  color: var(--ink-900);
  font-family: var(--sans-font);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

@media (max-width: 980px) {
  .layout__sidebar {
    order: -1;
    position: static;
  }

  .toc-panel {
    max-height: none;
  }
}

    .toc__empty {
  margin: 0;
  color: var(--ink-500);
  font-size: var(--text-sm);
}

.toc,
.toc__list {
  margin: 0;
  padding: 0;
  list-style: none;
}

.toc {
  --toc-item-radius: 2px;
  --toc-guide: rgba(148, 163, 184, 0.32);
  --toc-hover-bg: rgba(148, 163, 184, 0.11);
  --toc-active-bg: var(--accent-soft);
  --toc-active-line: var(--accent);
}

.toc__list {
  display: grid;
  gap: 0.08rem;
}

.toc__folder > .toc__list {
  position: relative;
  margin: 0.08rem 0 0.12rem 0.72rem;
  padding-left: 0.62rem;
}

.toc__folder > .toc__list::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0.24rem;
  bottom: 0.26rem;
  width: 1px;
  background: var(--toc-guide);
}

.toc__item {
  margin: 0;
  min-width: 0;
}

.toc__summary,
.toc__link {
  position: relative;
  display: block;
  min-width: 0;
  border-radius: var(--toc-item-radius);
  color: var(--ink-500);
  font-family: var(--sans-font);
  font-size: 0.88rem;
  line-height: 1.5;
  text-decoration: none;
  overflow-wrap: anywhere;
  transition: color 180ms ease, background-color 180ms ease;
}

.toc__link {
  padding: 0.15rem 0.44rem 0.15rem 0.72rem;
}

.toc__summary {
  list-style: none;
  cursor: pointer;
  padding: 0.15rem 1.25rem 0.15rem 0.72rem;
}

.toc__summary::-webkit-details-marker {
  display: none;
}

.toc__summary::marker {
  content: "";
}

.toc__summary::after {
  content: "";
  position: absolute;
  right: 0.56rem;
  top: 50%;
  width: 0.38rem;
  height: 0.38rem;
  border-right: 1.5px solid currentColor;
  border-bottom: 1.5px solid currentColor;
  opacity: 0.62;
  transform: translateY(-55%) rotate(-45deg);
  transition: transform 160ms ease, opacity 160ms ease;
}

.toc__folder[open] > .toc__summary::after {
  transform: translateY(-65%) rotate(45deg);
}

.toc__summary::before,
.toc__link::before {
  content: "";
  position: absolute;
  left: 0.34rem;
  top: 0.42rem;
  bottom: 0.42rem;
  width: 2px;
  border-radius: 999px;
  background: var(--toc-active-line);
  opacity: 0;
  transition: opacity 180ms ease;
}

.toc__item--level-1 > .toc__folder > .toc__summary,
.toc__item--level-1 > .toc__link {
  color: var(--ink-700);
  font-size: 0.94rem;
  font-weight: 600;
}

.toc__item--level-3 .toc__summary,
.toc__item--level-3 .toc__link,
.toc__item--level-4 .toc__summary,
.toc__item--level-4 .toc__link {
  font-size: var(--text-sm);
}

.toc__summary:hover,
.toc__summary.is-active,
.toc__link:hover,
.toc__link.is-active {
  color: var(--ink-900);
  background: var(--toc-hover-bg);
}

.toc__summary.is-active,
.toc__link.is-active {
  background: var(--toc-active-bg);
}

.toc__summary.is-active::before,
.toc__link.is-active::before {
  opacity: 1;
}

:root[data-theme="dark"] .toc {
  --toc-guide: rgba(148, 163, 184, 0.24);
  --toc-hover-bg: rgba(148, 163, 184, 0.14);
  --toc-active-bg: var(--accent-soft);
}

    .site-footer {
  margin-top: 1.6rem;
}

.site-footer__inner {
  display: flex;
  flex-wrap: wrap;
  gap: 0.45rem 0.8rem;
  padding-top: 0.65rem;
  border-top: 1px solid var(--line);
  color: var(--ink-500);
  font-family: var(--mono-font);
  font-size: var(--text-xs);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

    
      .markdown-content {

}

.markdown-content .post-meta__item {

}

.markdown-content h1,
.markdown-content h2,
.markdown-content h3,
.markdown-content h4,
.markdown-content h5,
.markdown-content h6 {

.markdown-content h1 {

.markdown-content p,
.markdown-content ul,
.markdown-content ol,
.markdown-content blockquote,
.markdown-content table,
.markdown-content pre,

.markdown-content ul,

.markdown-content p + p {

.markdown-content blockquote {

.markdown-content pre {

.markdown-content .code-block {

.markdown-content .code-block[data-language]::before {

  position: absolute;

.markdown-content .code-copy:hover,

.markdown-content table {

.markdown-content th,

.article-lock__eyebrow {

<script>(() => {
  const STORAGE_KEY = 'preferred-theme';
  const root = document.documentElement;
  const media = matchMedia('(prefers-color-scheme: dark)');
  const buttons = [...document.querySelectorAll('[data-theme-toggle]')];

  function savedTheme() {
    const value = localStorage.getItem(STORAGE_KEY);
    return value === 'light' || value === 'dark' ? value : '';
  }

  function applyTheme(theme) {
    root.dataset.theme = theme || (media.matches ? 'dark' : 'light');
    const isDark = root.dataset.theme === 'dark';
    buttons.forEach((button) => {
      button.dataset.activeTheme = isDark ? 'dark' : 'light';
      button.setAttribute('aria-label', isDark ? '切换至明亮模式' : '切换至黑夜模式');
    });
  }

  function toggleTheme() {
    const theme = root.dataset.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem(STORAGE_KEY, theme);
    applyTheme(theme);
  }

  applyTheme(savedTheme());

  media.addEventListener('change', () => applyTheme(savedTheme()));
  buttons.forEach((button) => button.addEventListener('click', toggleTheme));
})();
</script>
<script>(() => {
  const targets = [...document.querySelectorAll('.toc__target[data-slug]')];
  const items = targets.map((target) => ({
    target,
    heading: document.getElementById(target.dataset.slug)
  })).filter(({ heading }) => heading);
  if (!items.length) return;

  const byHeading = new Map(items.map(({ heading, target }) => [heading, target]));

  function setActive(activeTarget) {
    targets.forEach((target) => target.classList.toggle('is-active', target === activeTarget));
  }

  function openParents(target) {
    let details = target?.closest('details');
    while (details) {
      details.open = true;
      details = details.parentElement?.closest('details');
    }
  }

  function getHashTarget(hash) {
    const rawId = hash.replace(/^#/, '');
    try {
      return document.getElementById(decodeURIComponent(rawId)) || document.getElementById(rawId);
    } catch {
      return document.getElementById(rawId);
    }
  }

  const observer = new IntersectionObserver((entries) => {
    const visible = entries
      .filter(({ isIntersecting }) => isIntersecting)
      .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top)[0];
    if (visible) setActive(byHeading.get(visible.target));
  }, {
    rootMargin: '-24% 0px -64% 0px',
    threshold: [0, 1]
  });

  items.forEach(({ heading }) => observer.observe(heading));
  targets.forEach((target) => target.addEventListener('click', () => setActive(target)));

  const initialTarget = byHeading.get(getHashTarget(location.hash));
  if (initialTarget) {
    setActive(initialTarget);
    openParents(initialTarget);
  }
})();
</script>
<script>(() => {
  function fallbackCopy(text) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.setAttribute('readonly', '');
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.append(textarea);
    textarea.select();
    const copied = document.execCommand('copy');
    textarea.remove();
    return copied;
  }

  async function copyText(text) {
    if (navigator.clipboard?.writeText && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      return true;
    }
    return fallbackCopy(text);
  }

  document.addEventListener('click', async (event) => {
    const button = event.target.closest('[data-copy-code]');
    if (!button) return;

    const code = button.closest('pre')?.querySelector('code');
    if (!code) return;

    try {
      const copied = await copyText(code.textContent || '');
      button.textContent = copied ? 'Copied' : 'Failed';
    } catch {
      button.textContent = 'Failed';
    }

    clearTimeout(button._copyTimer);
    button._copyTimer = setTimeout(() => {
      button.textContent = 'Copy';
    }, 1600);
  });
})();
</script>
<script>(() => {
  const locks = [...document.querySelectorAll('[data-article-lock]')];
  if (!locks.length || !window.crypto?.subtle) return;

  const encoder = new TextEncoder();
  const decoder = new TextDecoder();

  function fromBase64(value) {
    return Uint8Array.from(atob(value), (char) => char.charCodeAt(0));
  }

  function concatBytes(a, b) {
    const result = new Uint8Array(a.length + b.length);
    result.set(a);
    result.set(b, a.length);
    return result;
  }

  async function decrypt(payload, password) {
    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      encoder.encode(password),
      'PBKDF2',
      false,
      ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt: fromBase64(payload.salt),
        iterations: payload.iterations,
        hash: 'SHA-256'
      },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const encrypted = concatBytes(fromBase64(payload.data), fromBase64(payload.tag));
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromBase64(payload.iv) }, key, encrypted);
    return decoder.decode(decrypted);
  }

  function bindLock(lock) {
    const form = lock.querySelector('[data-lock-form]');
    const message = lock.querySelector('[data-lock-message]');
    const payloadEl = lock.querySelector('[data-lock-payload]');
    const content = lock.querySelector('[data-lock-content]');
    const panel = lock.querySelector('.article-lock__panel');
    const payload = JSON.parse(payloadEl.textContent || '{}');

    async function unlock(password) {
      try {
        const html = await decrypt(payload, password);
        content.innerHTML = html;
        content.hidden = false;
        panel.hidden = true;
      } catch {
        message.textContent = '密码不正确。';
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      message.textContent = '';
      unlock(new FormData(form).get('password') || '');
    });
  }

  locks.forEach(bindLock);
})();
</script>
<script>(() => {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const root = document.documentElement;
  const body = document.body;
  let navigating = false;

  const clearPreload = () => {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      root.classList.remove('is-page-transition-preload');
    }));
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', clearPreload, { once: true });
  } else {
    clearPreload();
  }

  function shouldAnimate(link, event) {
    if (!link || event.defaultPrevented || event.button !== 0) return false;
    if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return false;
    if ((link.target && link.target !== '_self') || link.hasAttribute('download')) return false;

    const href = link.getAttribute('href') || '';
    if (!href || href.startsWith('#') || /^(mailto:|tel:|javascript:)/.test(href)) return false;

    const url = new URL(link.href, location.href);
    const samePage = url.pathname === location.pathname && url.search === location.search;
    return url.origin === location.origin && !(samePage && url.hash);
  }

  document.addEventListener('click', (event) => {
    const link = event.target.closest('a');
    if (!shouldAnimate(link, event) || navigating) return;

    event.preventDefault();
    navigating = true;
    root.classList.add('is-page-transition-lock');
    body.classList.add('is-page-leaving');
    setTimeout(() => { location.href = link.href; }, 220);
  });

  window.addEventListener('pageshow', () => {
    navigating = false;
    root.classList.remove('is-page-transition-lock', 'is-page-transition-preload');
    body.classList.remove('is-page-leaving');
  });

  window.addEventListener('pagehide', () => body.classList.add('is-page-leaving'));
})();
</script>
